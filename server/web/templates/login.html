<!DOCTYPE html>
<html>
<head>
    <title>LastControl | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 400px; border-top: 5px solid #00008B; }
    </style>
</head>
<body class="text-center">
    <div class="card shadow login-card mx-auto">
        <div class="card-body p-5">
            <h3 class="mb-4" style="color: #00008B;">LastControl</h3>
            <form method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
                <button type="submit" class="btn w-100 text-white" style="background-color: #00008B;">Log In</button>
            </form>
        </div>
    </div>
</body>
</html>
