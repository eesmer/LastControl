{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="fas fa-users text-primary"></i> {{ hostname }} <small class="text-muted">Yerel Kullanıcılar ve Erişim Takibi</small></h4>
    <a href="/" class="btn btn-sm btn-secondary">Geri Dön</a>
</div>

{% for report in reports %}
<div class="card mb-3 shadow-sm">
    <div class="card-header bg-light d-flex justify-content-between">
        <span class="text-muted small">Tarama Zamanı: {{ report.created_at }}</span>
    </div>
    <div class="card-body">
        <div class="row g-2">
            {% for user_entry in report.info_data.split(', ') %}
                <div class="col-md-4 col-sm-6">
                    <div class="p-2 border rounded bg-white shadow-xs">
                        <i class="fas fa-user-circle text-info me-2"></i>
                        <span class="fw-bold">{{ user_entry }}</span>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
