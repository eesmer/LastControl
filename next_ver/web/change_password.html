{% extends "layout.html" %}
{% block content %}
<div class="card shadow mx-auto" style="max-width: 400px;">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0" style="color: #00008B;">Parola Güncelle</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label small text-muted">Yeni Parola</label>
                <input type="password" name="new_password" class="form-control" placeholder="Minimum 8 karakter..." required>
            </div>
            <button type="submit" class="btn text-white w-100" style="background-color: #00008B;">Güncelle</button>
        </form>
    </div>
</div>
{% endblock %}
