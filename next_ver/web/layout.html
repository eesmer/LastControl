<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LastControl Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --lc-darkblue: #00008B; }
        body { background-color: #e9ecef; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--lc-darkblue) !important; border-bottom: 3px solid #000055; }
        .lc-logo { 
            font-weight: 800; 
            text-decoration: none; 
            color: white !important; 
            letter-spacing: 1px;
            padding: 5px 15px;
            border: 2px solid white;
            border-radius: 5px;
            transition: 0.3s;
        }
        .lc-logo:hover { background-color: white; color: var(--lc-darkblue) !important; }
        .card { border-top: 4px solid var(--lc-darkblue); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow">
    <a href="https://www.github.com/eesmer/LastControl" target="_blank" class="lc-logo d-none d-md-block">LastControl</a>
    <div class="container">
        <div class="d-flex align-items-center">
            <a class="navbar-brand shadow-sm me-3" href="/">Ana Menü</a>
            <a href="/download-agent" class="btn btn-sm btn-outline-light">
                <i class="fas fa-download me-1"></i> Agent İndir
            </a>
        </div>
    </div>

    <div class="ms-auto d-flex align-items-center">
	    <div class="dropdown me-3">
	    <a class="nav-link dropdown-toggle text-white" href="#" id="userMenu" data-bs-toggle="dropdown">
	    <i class="fas fa-user-circle"></i> Admin
	    </a>
	    <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/change-password"><i class="fas fa-key me-2"></i> Parola Değiştir</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="/logout"><i class="fas fa-sign-out-alt me-2"></i> Çıkış Yap</a></li>
	    </ul>
    </div>
</div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
