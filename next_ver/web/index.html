{% extends "layout.html" %}
{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h4 style="color: #00008B;">Agent Yönetim Paneli</h4>
    </div>
    <div class="col-md-6">
        <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">
                <i class="fas fa-search text-muted"></i>
            </span>
            <input type="text" id="agentSearch" class="form-control border-start-0" placeholder="Hostname veya IP ile ara...">
        </div>
    </div>
</div>

<div class="card shadow">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="agentTable">
            <thead>
            <tr>
            <th>Hostname</th>
	    <th>Son Rapor Tarihi</th>
	    <th class="text-center">Envanter</th>
	    <th class="text-center">Açık Portlar</th> </tr>
	    <th class="text-center">Disk Kullanımı</th> </tr>
	    </thead>
	    <tbody>
	    {% for agent in agents %}
	    <tr>
	    <td class="fw-bold">{{ agent.hostname }}</td>
	    <td><span class="badge bg-light text-dark border">{{ agent.last_report }}</span></td>
	    <td class="text-center">
	    <a href="/agent/{{ agent.hostname }}" class="btn btn-sm text-white" style="background-color: #00008B;">Detaylar</a>
	    </td>
	    <td class="text-center">
            <a href="/ports/{{ agent.hostname }}" class="btn btn-sm btn-outline-dark">Detaylar</a> </td>
	    <td class="text-center">
	    <a href="/disk/{{ agent.hostname }}" class="btn btn-sm btn-outline-danger ms-1">
            <i class="fas fa-hard-drive"></i> Disk Durumu
	    </a>
            </tr>
	    {% endfor %}
	    </tbody>
	    </table>
        </div>
    </div>
</div>

<script>
document.getElementById('agentSearch').addEventListener('keyup', function() {
    let filter = this.value.toUpperCase();
    let rows = document.querySelector("#agentTable tbody").rows;
    
    for (let i = 0; i < rows.length; i++) {
        let hostname = rows[i].cells[0].textContent.toUpperCase();
        let reportDate = rows[i].cells[1].textContent.toUpperCase();
        if (hostname.indexOf(filter) > -1 || reportDate.indexOf(filter) > -1) {
            rows[i].style.display = "";
        } else {
            rows[i].style.display = "none";
        }      
    }
});
</script>
{% endblock %}
